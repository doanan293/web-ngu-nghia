services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    user: root
    environment:
      ADMIN_PASSWORD: admin
      JVM_ARGS: -Xmx1g
    ports:
      - "3030:3030"
    volumes:
      - ./fuseki-config.ttl:/fuseki/configuration/ca-map.ttl:ro
      - ./ca-map.rules:/fuseki/ca-map.rules:ro
      - fuseki-db:/fuseki/databases

volumes:
  fuseki-db:
